<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Arcade</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- Menu -->
        <div id="screen-menu" class="screen active">
            <div class="game-title">Snake</div>
            <div class="game-subtitle">Arcade</div>
            <div class="menu-buttons">
                <button id="btn-play" class="btn btn-primary">Play</button>
                <button id="btn-shop" class="btn">Shop</button>
                <button id="btn-skins" class="btn">Skins</button>
                <button id="btn-achievements" class="btn">Achievements</button>
                <button id="btn-settings" class="btn">Settings</button>
            </div>
        </div>

        <!-- Playing (empty - HUD drawn on canvas) -->
        <div id="screen-playing" class="screen"></div>

        <!-- Paused -->
        <div id="screen-paused" class="screen">
            <div class="pause-panel">
                <div class="pause-title">Paused</div>
                <button id="btn-resume" class="btn btn-primary">Resume</button>
                <button id="btn-quit" class="btn">Quit</button>
            </div>
        </div>

        <!-- Results -->
        <div id="screen-results" class="screen">
            <div class="results-panel">
                <div class="results-title">Game Over</div>
                <div id="result-high"></div>
                <div class="results-grid">
                    <div class="result-item">
                        <div class="result-label">Score</div>
                        <div class="result-value" id="result-score">0</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Coins</div>
                        <div class="result-value coins" id="result-coins">+0</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Length</div>
                        <div class="result-value" id="result-length">0</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Food</div>
                        <div class="result-value" id="result-food">0</div>
                    </div>
                </div>
                <button id="btn-play-again" class="btn btn-primary">Play Again</button>
                <button id="btn-to-menu" class="btn">Menu</button>
            </div>
        </div>

        <!-- Settings -->
        <div id="screen-settings" class="screen">
            <div class="settings-panel">
                <div class="settings-title">Settings</div>
                <div class="settings-group">
                    <button id="btn-sound" class="btn">Sound: ON</button>
                    <button id="btn-difficulty" class="btn">Difficulty: Normal</button>
                </div>
                <div class="controls-info">
                    Arrow Keys / WASD — Move<br>
                    Escape — Pause
                </div>
                <br>
                <button id="btn-reset" class="btn btn-small btn-danger">Reset Progress</button>
                <br><br>
                <button id="btn-back-settings" class="btn btn-small">Back</button>
            </div>
        </div>

        <!-- Shop -->
        <div id="screen-shop" class="screen">
            <div class="shop-panel">
                <div class="shop-title">Shop</div>
                <div class="shop-coins">Coins: <span id="shop-coins">0</span></div>
                <div class="skin-grid" id="shop-grid"></div>
                <button id="btn-back-shop" class="btn btn-small">Back</button>
            </div>
        </div>

        <!-- Skins -->
        <div id="screen-skins" class="screen">
            <div class="skins-panel">
                <div class="shop-title">Skins</div>
                <div class="skin-grid" id="skins-grid"></div>
                <button id="btn-back-skins" class="btn btn-small">Back</button>
            </div>
        </div>

        <!-- Achievements -->
        <div id="screen-achievements" class="screen">
            <div class="achievements-panel">
                <div class="achievements-title">Achievements</div>
                <div class="achievements-grid" id="achievements-grid"></div>
                <button id="btn-back-achievements" class="btn btn-small">Back</button>
            </div>
        </div>
    </div>

    <!-- Scripts (order matters: dependencies first) -->
    <script src="js/constants.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/state.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/input.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/screens.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
