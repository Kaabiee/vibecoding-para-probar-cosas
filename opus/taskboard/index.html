<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <div class="header-left">
            <button id="btn-menu" class="btn-menu" title="Menu">
                <span></span><span></span><span></span>
            </button>
            <h1 class="logo"><svg class="logo-cat" width="36" height="40" viewBox="0 0 64 72" fill="currentColor">
                <!-- Orejas -->
                <path d="M10 24 L4 2 L20 16Z"/>
                <path d="M54 24 L60 2 L44 16Z"/>
                <!-- Cabeza y cuerpo -->
                <path d="M12 22 C12 22 8 30 8 40 C8 52 16 62 32 62 C48 62 56 52 56 40 C56 30 52 22 52 22 L44 16 L20 16Z"/>
                <!-- Ojos -->
                <ellipse cx="22" cy="36" rx="4" ry="4.5" fill="var(--bg-header)"/>
                <ellipse cx="42" cy="36" rx="4" ry="4.5" fill="var(--bg-header)"/>
                <!-- Pupilas -->
                <ellipse cx="23" cy="36" rx="2" ry="3" fill="currentColor" opacity="0.6"/>
                <ellipse cx="43" cy="36" rx="2" ry="3" fill="currentColor" opacity="0.6"/>
                <!-- Nariz -->
                <path d="M30 44 L32 47 L34 44Z" fill="var(--bg-header)"/>
                <!-- Boca -->
                <path d="M26 48 Q32 53 38 48" stroke="var(--bg-header)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                <!-- Bigotes -->
                <line x1="4" y1="38" x2="18" y2="40" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="4" y1="44" x2="18" y2="43" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="60" y1="38" x2="46" y2="40" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="60" y1="44" x2="46" y2="43" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>Flowboard</h1>
        </div>
        <div class="header-right">
            <button id="btn-new-board" class="btn btn-primary">+ Nuevo</button>
            <button id="btn-rename-board" class="btn btn-ghost">Renombrar</button>
            <button id="btn-delete-board" class="btn btn-danger">Eliminar</button>
            <button id="btn-lock-board" class="btn-lock" title="Proteger con contrasena">&#128274;</button>
            <button id="btn-notes" class="btn-notes" title="Notas">&#128221;</button>
            <button id="btn-bg-settings" class="btn-bg-settings" title="Fondo">&#9881;</button>
            <button id="theme-toggle" class="theme-toggle" title="Cambiar tema">
                <div class="theme-toggle-track">
                    <span class="theme-toggle-icon sun">&#9728;</span>
                    <span class="theme-toggle-icon moon">&#9790;</span>
                </div>
                <div class="theme-toggle-thumb"></div>
            </button>
        </div>
    </header>

    <!-- Sidebar Menu -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <button id="sidebar-close" class="bg-panel-close">&times;</button>
        </div>
        <div class="sidebar-body">
            <div class="sidebar-section">
                <div class="sidebar-section-title">Mis tableros</div>
                <div id="sidebar-boards"></div>
                <button id="sidebar-new-board" class="sidebar-action-btn">+ Crear tablero</button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Plantillas</div>
                <div id="sidebar-templates" class="sidebar-templates"></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Estadisticas</div>
                <div id="sidebar-stats" class="sidebar-stats"></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Atajos de teclado</div>
                <div class="sidebar-shortcuts">
                    <div class="shortcut-item"><kbd>M</kbd> Abrir menu</div>
                    <div class="shortcut-item"><kbd>B</kbd> Nuevo tablero</div>
                    <div class="shortcut-item"><kbd>N</kbd> Abrir notas</div>
                    <div class="shortcut-item"><kbd>T</kbd> Cambiar tema</div>
                    <div class="shortcut-item"><kbd>Esc</kbd> Cerrar paneles</div>
                </div>
            </div>
        </div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <div id="board-bar" class="board-bar">
        <button id="board-selector" class="board-selector-btn">
            <span id="board-name" class="board-name">Mi Proyecto</span>
            <svg class="board-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div id="board-dropdown" class="board-dropdown hidden"></div>
    </div>

    <main id="board-container">
        <!-- Columns rendered dynamically -->
    </main>

    <!-- Background Settings Panel -->
    <aside id="bg-panel" class="bg-panel">
        <div class="bg-panel-header">
            <h3>Fondo del tablero</h3>
            <button id="bg-panel-close" class="bg-panel-close">&times;</button>
        </div>
        <div class="bg-panel-body">
            <div class="bg-section">
                <div class="bg-section-title">Color personalizado</div>
                <div class="bg-color-row">
                    <input type="color" id="bg-color-picker" class="bg-color-input" value="#1a1a1a">
                    <button id="bg-color-apply" class="btn btn-primary bg-color-apply">Aplicar color</button>
                </div>
            </div>

            <div class="bg-section">
                <div class="bg-section-title">Colores predefinidos</div>
                <div id="bg-preset-colors" class="bg-preset-colors"></div>
            </div>

            <div class="bg-section">
                <div class="bg-section-title">Imagenes</div>
                <div id="bg-image-grid" class="bg-image-grid"></div>
            </div>

            <div class="bg-section">
                <div class="bg-section-title">Imagen personalizada</div>
                <button id="bg-upload-btn" class="bg-upload-btn">Subir imagen</button>
                <input type="file" id="bg-file-input" accept="image/*">
            </div>

            <div class="bg-section">
                <button id="bg-reset" class="btn btn-ghost bg-reset-btn">Restablecer fondo</button>
            </div>
        </div>
    </aside>

    <!-- Notes Panel -->
    <aside id="notes-panel" class="notes-panel">
        <div class="notes-panel-header">
            <h3>Mis Notas</h3>
            <button id="notes-panel-close" class="bg-panel-close">&times;</button>
        </div>
        <div id="notes-list" class="notes-panel-body"></div>
        <div class="notes-add-bar">
            <input type="text" id="notes-input" placeholder="Escribe una nota..." autocomplete="off">
            <button id="notes-add-btn">Agregar</button>
        </div>
    </aside>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-ghost">Cancelar</button>
                <button id="modal-confirm" class="btn btn-primary">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="js/constants.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/state.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/board.js"></script>
    <script src="js/column.js"></script>
    <script src="js/card.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/background.js"></script>
    <script src="js/notes.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/render.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
